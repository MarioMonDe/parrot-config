
<style>
.g-wrap { padding: 1rem 0; }

.g-hdr .badge { display:inline-block; font-size:11px; color:var(--color-text-success); background:var(--color-background-success); border:0.5px solid var(--color-border-success); border-radius:20px; padding:3px 12px; letter-spacing:2px; margin-bottom:8px; }

.pdot.active button { border-color:var(--color-border-success); color:var(--color-text-success); background:var(--color-background-success); }

.panel { display:none; }
.panel.on { display:block; animation:fi 0.25s ease; }
@keyframes fi { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
.phead { display:flex; align-items:center; gap:10px; margin-bottom:1rem; }
.pnum { width:28px; height:28px; border-radius:50%; border:1.5px solid var(--color-border-success); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:500; color:var(--color-text-success); flex-shrink:0; }

.analogy { background:var(--color-background-warning); border-left:2px solid var(--color-border-warning); padding:10px 14px; border-radius:0 var(--border-radius-md) var(--border-radius-md) 0; margin-bottom:1rem; font-size:13px; color:var(--color-text-warning); font-family:var(--font-sans); line-height:1.6; }
.warn { background:var(--color-background-danger); border-left:2px solid var(--color-border-danger); padding:10px 14px; border-radius:0 var(--border-radius-md) var(--border-radius-md) 0; margin-bottom:1rem; font-size:12px; color:var(--color-text-danger); font-family:var(--font-sans); line-height:1.6; }
.info-box { background:var(--color-background-info); border-left:2px solid var(--color-border-info); padding:10px 14px; border-radius:0 var(--border-radius-md) var(--border-radius-md) 0; margin-bottom:1rem; font-size:12px; color:var(--color-text-info); font-family:var(--font-sans); }
.cmd-block { margin-bottom:10px; border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-md); overflow:hidden; }
.cmd-top { background:var(--color-background-secondary); padding:5px 10px; border-bottom:0.5px solid var(--color-border-tertiary); display:flex; justify-content:space-between; align-items:center; }
.cmd-top span { font-size:11px; color:var(--color-text-tertiary); font-family:var(--font-mono); }
.cpbtn { background:transparent; border:none; font-size:11px; color:var(--color-text-tertiary); cursor:pointer; padding:2px 6px; border-radius:4px; font-family:var(--font-mono); }
.cpbtn:hover { background:var(--color-background-tertiary); color:var(--color-text-primary); }
.cpbtn.ok { color:var(--color-text-success); }
pre.code { background:var(--color-background-secondary); padding:12px; font-size:12px; color:var(--color-text-primary); overflow-x:auto; line-height:1.65; margin:0; font-family:var(--font-mono); }
.checklist { margin-bottom:1rem; }
.chk { display:flex; align-items:flex-start; gap:8px; padding:7px 0; border-bottom:0.5px solid var(--color-border-tertiary); font-size:13px; color:var(--color-text-secondary); font-family:var(--font-sans); }
.chk:last-child { border-bottom:none; }
.chk i { color:var(--color-text-success); flex-shrink:0; margin-top:2px; }
.nav { display:flex; gap:8px; margin-top:1.5rem; padding-top:1rem; border-top:0.5px solid var(--color-border-tertiary); }
.nav button { flex:1; padding:9px 12px; border:0.5px solid var(--color-border-secondary); background:var(--color-background-secondary); color:var(--color-text-secondary); cursor:pointer; border-radius:var(--border-radius-md); font-size:13px; font-family:var(--font-mono); transition:all 0.15s; }
.nav button:hover { background:var(--color-background-tertiary); }
.nav button:disabled { opacity:0.3; cursor:not-allowed; }
.nav .next { border-color:var(--color-border-success); color:var(--color-text-success); }
.nav .next:hover { background:var(--color-background-success); }
.fin-wrap { text-align:center; padding:1.5rem 0; }
.fin-wrap h2 { font-size:18px; font-weight:500; color:var(--color-text-primary); margin:8px 0; }
.fin-wrap p { font-size:13px; color:var(--color-text-secondary); font-family:var(--font-sans); line-height:1.7; margin-bottom:1rem; }
.nxt-steps { background:var(--color-background-secondary); border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-lg); padding:1rem; text-align:left; margin-bottom:1rem; }
.nxt-steps h3 { font-size:13px; font-weight:500; color:var(--color-text-primary); margin-bottom:10px; }

function renderProg(){
  var el=document.getElementById('prog'), html='';
  for(var i=0;i<steps.length;i++){
    var cls='pdot';
    if(i===cur) cls+=' active';
    else if(done.indexOf(i)>=0) cls+=' done';
    html+='<div class="'+cls+'"><button onclick="goto('+i+')">'+steps[i].n+' '+steps[i].t+'</button></div>';
  }
  el.innerHTML=html;
}

function buildStep(s,idx){
  var h='';
  if(s.desc) h+='<p class="desc">'+s.desc+'</p>';
  if(s.analogy) h+='<div class="analogy">'+s.analogy+'</div>';
  if(s.warn) h+='<div class="warn"><i class="ti ti-alert-triangle" aria-hidden="true"></i> '+s.warn+'</div>';
  if(s.info) h+='<div class="info-box"><i class="ti ti-info-circle" aria-hidden="true"></i> '+s.info+'</div>';
  for(var i=0;i<s.cmds.length;i++){
    var c=s.cmds[i], enc=encodeURIComponent(c.code);
    h+='<div class="cmd-block"><div class="cmd-top"><span>$ '+c.lbl+'</span>';
    h+='<button class="cpbtn" onclick="cp(this,\''+enc+'\')"><i class="ti ti-copy" aria-hidden="true"></i> copiar</button></div>';
    h+='<pre class="code">'+c.code+'</pre></div>';
  }
  if(s.checks){
    h+='<div class="checklist">';
    for(var j=0;j<s.checks.length;j++)
      h+='<div class="chk"><i class="ti ti-circle-check" aria-hidden="true"></i>'+s.checks[j]+'</div>';
    h+='</div>';
  }
  var last=(idx===steps.length-2);
  h+='<div class="nav">';
  h+='<button '+(idx===0?'disabled':'')+' onclick="goto('+(idx-1)+')"><i class="ti ti-arrow-left" aria-hidden="true"></i> anterior</button>';
  h+='<button class="next" onclick="advance('+idx+')">'+(last?'Finalizar <i class="ti ti-check" aria-hidden="true"></i>':'siguiente <i class="ti ti-arrow-right" aria-hidden="true"></i>')+'</button>';
  h+='</div>';
  return h;
}

function buildFinished(){
  var restartCmd='sudo systemctl restart display-manager';
  return '<div class="fin-wrap">'
    +'<div style="font-size:36px;margin-bottom:8px">🎉</div>'
    +'<h2>¡Entorno configurado!</h2>'
    +'<p>Tu Parrot OS tiene el setup completo estilo S4vitar.<br>Cierra sesión y selecciona <strong>BSPWM</strong> en el gestor de login.</p>'
    +'<div class="cmd-block" style="text-align:left;margin-bottom:1rem">'
    +'<div class="cmd-top"><span>$ reiniciar sesión gráfica</span>'
    +'<button class="cpbtn" onclick="cp(this,\''+encodeURIComponent(restartCmd)+'\')"><i class="ti ti-copy" aria-hidden="true"></i> copiar</button></div>'
    +'<pre class="code">'+restartCmd+'</pre></div>'
    +'<div class="nxt-steps">'
    +'<h3><i class="ti ti-list-check" aria-hidden="true"></i> Próximos pasos recomendados</h3>'
    +'<div class="nxt-item"><i class="ti ti-arrow-right" aria-hidden="true"></i>Practica en TryHackMe (ideal para principiantes)</div>'
    +'<div class="nxt-item"><i class="ti ti-arrow-right" aria-hidden="true"></i>Pasa a HackTheBox cuando domines lo básico</div>'
    +'<div class="nxt-item"><i class="ti ti-arrow-right" aria-hidden="true"></i>Sigue los cursos de S4vitar en YouTube y Twitch</div>'
    +'<div class="nxt-item"><i class="ti ti-arrow-right" aria-hidden="true"></i>Conecta tu VPN de HTB: sudo openvpn archivo.ovpn</div>'
    +'<div class="nxt-item"><i class="ti ti-arrow-right" aria-hidden="true"></i>Haz snapshots de tu VM antes de cada práctica</div>'
    +'</div>'
    +'<div class="nav">'
    +'<button onclick="goto('+(steps.length-2)+')"><i class="ti ti-arrow-left" aria-hidden="true"></i> volver</button>'
    +'<button class="next" onclick="sendPrompt(\'Recomiéndame máquinas de TryHackMe para principiantes en ciberseguridad\')">Recomiéndame CTFs para empezar ↗</button>'
    +'</div></div>';
}

function renderAll(){
  var ct=document.getElementById('container'), html='';
  for(var i=0;i<steps.length;i++){
    var s=steps[i];
    html+='<div class="panel'+(i===cur?' on':'')+'" id="p'+i+'">';
    html+='<div class="phead"><div class="pnum">'+s.n+'</div><h2>'+s.t+'</h2></div>';
    html+=(s.finished?buildFinished():buildStep(s,i));
    html+='</div>';
  }
  ct.innerHTML=html;
}

function goto(i){
  cur=i;
  renderProg();
  var panels=document.querySelectorAll('.panel');
  for(var k=0;k<panels.length;k++) panels[k].classList.remove('on');
  var p=document.getElementById('p'+i);
  if(p) p.classList.add('on');
}

function advance(i){
  if(done.indexOf(i)<0) done.push(i);
  goto(i+1);
}

function cp(btn,enc){
  navigator.clipboard.writeText(decodeURIComponent(enc)).then(function(){
    btn.innerHTML='<i class="ti ti-check" aria-hidden="true"></i> copiado';
    btn.classList.add('ok');
    setTimeout(function(){ btn.innerHTML='<i class="ti ti-copy" aria-hidden="true"></i> copiar'; btn.classList.remove('ok'); },2000);
  }).catch(function(){ btn.textContent='(selecciona y copia manualmente)'; });
}

renderProg();
renderAll();
</script>
