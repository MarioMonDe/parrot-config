
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --g: #00ff88; --g2: #00cc6a; --gd: #004422;
    --bg0: #0a0f0a; --bg1: #0f1a0f; --bg2: #162016; --bg3: #1e2e1e;
    --t1: #e8f5e8; --t2: #a0c8a0; --t3: #5a8a5a;
    --red: #ff4444; --amber: #ffaa00; --blue: #44aaff;
    --border: rgba(0,255,136,0.15);
  }
  body { background: transparent; font-family: var(--font-mono, monospace); color: var(--t1); }
  .wrap { padding: 1rem 0; }

  .hdr { text-align: center; padding: 1.5rem 1rem 1rem; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
  .hdr-logo { font-size: 11px; color: var(--g); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; }
  .hdr h1 { font-size: 20px; font-weight: 500; color: var(--g); margin-bottom: 4px; }
  .hdr p { font-size: 13px; color: var(--t3); }

  .progress-bar { display: flex; gap: 4px; padding: 0 1rem 1.5rem; overflow-x: auto; }
  .step-dot { flex: 1; min-width: 0; }
  .step-dot button {
    width: 100%; padding: 6px 4px; font-size: 10px; border: 1px solid var(--border);
    background: var(--bg1); color: var(--t3); cursor: pointer;
    border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: all 0.2s; font-family: var(--font-mono, monospace);
  }
  .step-dot.active button { border-color: var(--g); color: var(--g); background: rgba(0,255,136,0.08); }
  .step-dot.done button { border-color: var(--g2); color: var(--g2); background: rgba(0,204,106,0.05); }

  .panel { display: none; padding: 0 1rem; animation: fadeIn 0.3s ease; }
  .panel.visible { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .panel-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 1.2rem; }
  .step-num { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--g); display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--g); flex-shrink: 0; }
  .panel-hdr h2 { font-size: 16px; font-weight: 500; color: var(--g); }

  .desc { font-size: 13px; color: var(--t2); line-height: 1.7; margin-bottom: 1rem; font-family: var(--font-sans, sans-serif); }
  .analogy { background: rgba(255,170,0,0.07); border-left: 2px solid var(--amber); border-radius: 0 6px 6px 0; padding: 10px 14px; margin-bottom: 1rem; font-size: 13px; color: #ffcc66; font-family: var(--font-sans, sans-serif); line-height: 1.6; }
  .analogy strong { color: var(--amber); }
  .warn { background: rgba(255,68,68,0.07); border-left: 2px solid var(--red); border-radius: 0 6px 6px 0; padding: 10px 14px; margin-bottom: 1rem; font-size: 12px; color: #ff9999; font-family: var(--font-sans, sans-serif); }
  .info { background: rgba(68,170,255,0.07); border-left: 2px solid var(--blue); border-radius: 0 6px 6px 0; padding: 10px 14px; margin-bottom: 1rem; font-size: 12px; color: #88ccff; font-family: var(--font-sans, sans-serif); }

  .cmd-block { margin-bottom: 10px; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .cmd-label { background: var(--bg2); padding: 4px 10px; font-size: 10px; color: var(--t3); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .cmd-label span { color: var(--g); }
  .copy-btn { background: transparent; border: none; color: var(--t3); cursor: pointer; font-size: 11px; font-family: var(--font-mono, monospace); padding: 2px 6px; border-radius: 3px; transition: all 0.2s; }
  .copy-btn:hover { color: var(--g); background: rgba(0,255,136,0.1); }
  .copy-btn.copied { color: var(--g); }
  pre { background: var(--bg1); padding: 12px; font-size: 12px; color: var(--t1); overflow-x: auto; line-height: 1.6; }
  .prompt { color: var(--g); }
  .comment { color: var(--t3); }

  .checks { margin-bottom: 1rem; }
  .check-item { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; border-bottom: 1px solid rgba(0,255,136,0.06); font-size: 13px; color: var(--t2); font-family: var(--font-sans, sans-serif); }
  .check-item:last-child { border-bottom: none; }
  .check-icon { color: var(--g); font-size: 14px; flex-shrink: 0; margin-top: 1px; }

  .nav { display: flex; gap: 8px; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); }
  .nav button {
    flex: 1; padding: 9px; border: 1px solid var(--border); background: var(--bg2);
    color: var(--t2); cursor: pointer; border-radius: 6px; font-size: 13px;
    font-family: var(--font-mono, monospace); transition: all 0.2s;
  }
  .nav .btn-next { border-color: var(--g); color: var(--g); background: rgba(0,255,136,0.08); }
  .nav button:hover { background: var(--bg3); }
  .nav .btn-next:hover { background: rgba(0,255,136,0.15); }
  .nav button:disabled { opacity: 0.3; cursor: not-allowed; }

  .tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; margin-right: 4px; }
  .tag-req { background: rgba(255,68,68,0.15); color: #ff9999; border: 1px solid rgba(255,68,68,0.3); }
  .tag-opt { background: rgba(68,170,255,0.1); color: #88ccff; border: 1px solid rgba(68,170,255,0.25); }
  .tag-tool { background: rgba(0,255,136,0.08); color: var(--g2); border: 1px solid var(--border); }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
  .mini-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 10px; }
  .mini-card h3 { font-size: 12px; color: var(--g); margin-bottom: 4px; }
  .mini-card p { font-size: 11px; color: var(--t3); font-family: var(--font-sans, sans-serif); line-height: 1.5; }

  .finished { text-align: center; padding: 2rem 1rem; }
  .finished .big { font-size: 36px; margin-bottom: 8px; }
  .finished h2 { color: var(--g); font-size: 18px; margin-bottom: 8px; }
  .finished p { color: var(--t2); font-size: 13px; font-family: var(--font-sans); line-height: 1.7; }
  .next-steps { text-align: left; margin-top: 1.5rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
  .next-steps h3 { color: var(--g); font-size: 13px; margin-bottom: 10px; }
  .next-step-item { display: flex; gap: 8px; padding: 6px 0; border-bottom: 1px solid rgba(0,255,136,0.06); font-size: 12px; color: var(--t2); font-family: var(--font-sans); }
  .next-step-item:last-child { border-bottom: none; }
  .arrow { color: var(--g); }
</style>

function renderProgress() {
  const bar = document.getElementById('progress');
  bar.innerHTML = steps.map((s,i) => `
    <div class="step-dot ${i===current?'active':done.has(i)?'done':''}" id="dot${i}">
      <button onclick="goto(${i})" title="${s.title}">${s.icon} ${s.title}</button>
    </div>`).join('');
}

function renderPanels() {
  const container = document.getElementById('panels');
  container.innerHTML = steps.map((s,i) => `
    <div class="panel ${i===current?'visible':''}" id="panel${i}">
      <div class="panel-hdr">
        <div class="step-num">${s.icon}</div>
        <h2>${s.title}</h2>
      </div>
      ${s.finished ? renderFinished(s) : renderStep(s, i)}
    </div>`).join('');
}

function renderStep(s, idx) {
  let html = '';
  if(s.desc) html += `<p class="desc">${s.desc}</p>`;
  if(s.analogy) html += `<div class="analogy">${s.analogy}</div>`;
  if(s.warn) html += `<div class="warn">${s.warn}</div>`;
  if(s.info) html += `<div class="info">${s.info}</div>`;
  if(s.cmds) html += s.cmds.map((c,ci) => `
    <div class="cmd-block">
      <div class="cmd-label"><span>$ ${c.label}</span><button class="copy-btn" onclick="copyCmd(this, '${encodeURIComponent(cmd(c.code))}')" aria-label="copiar"><i class="ti ti-copy" aria-hidden="true"></i> copiar</button></div>
      <pre>${c.code}</pre>
    </div>`).join('');
  if(s.checks) html += `<div class="checks">${s.checks.map(c=>`<div class="check-item"><span class="check-icon"><i class="ti ti-circle-check" aria-hidden="true"></i></span>${c}</div>`).join('')}</div>`;
  html += `<div class="nav">
    <button ${idx===0?'disabled':''} onclick="goto(${idx-1})">← anterior</button>
    <button class="btn-next" onclick="advance(${idx})">${idx===steps.length-2?'Finalizar ✓':'siguiente →'}</button>
  </div>`;
  return html;
}

function renderFinished(s) {
  return `<div class="finished">
    <div class="big">🎉</div>
    <h2>¡Entorno configurado!</h2>
    <p>Tu Parrot OS ahora tiene el setup completo estilo S4vitar.<br>Reinicia la sesión y selecciona <strong>BSPWM</strong> en el gestor de login.</p>
    <div class="cmd-block" style="margin:1rem 0; text-align:left;">
      <div class="cmd-label"><span>$ reiniciar sesión</span><button class="copy-btn" onclick="copyCmd(this,'${encodeURIComponent(cmd(s.cmds[0].code))}')" aria-label="copiar"><i class="ti ti-copy" aria-hidden="true"></i> copiar</button></div>
      <pre>${s.cmds[0].code}</pre>
    </div>
    <div class="next-steps">
      <h3><i class="ti ti-arrow-right" aria-hidden="true"></i> Próximos pasos recomendados</h3>
      <div class="next-step-item"><span class="arrow">→</span> Practica en plataformas CTF: HackTheBox, TryHackMe</div>
      <div class="next-step-item"><span class="arrow">→</span> Aprende reconocimiento con nmap y gobuster</div>
      <div class="next-step-item"><span class="arrow">→</span> Estudia los cursos de S4vitar en YouTube / Twitch</div>
      <div class="next-step-item"><span class="arrow">→</span> Configura una VPN para HTB: sudo openvpn tu.ovpn</div>
      <div class="next-step-item"><span class="arrow">→</span> Crea snapshots de tu VM antes de cada práctica</div>
    </div>
    <div class="nav" style="margin-top:1rem;">
      <button onclick="goto(${steps.length-2})">← volver</button>
      <button class="btn-next" onclick="sendPrompt('¿Qué máquinas de HackTheBox recomiendas para principiantes?') ">Recomiéndame CTFs para empezar ↗</button>
    </div>
  </div>`;
}

function goto(i) {
  current = i;
  renderProgress();
  renderPanels();
}

function advance(i) {
  done.add(i);
  current = i + 1;
  renderProgress();
  renderPanels();
}

function copyCmd(btn, encoded) {
  const text = decodeURIComponent(encoded).replace(/\s*#.*$/gm,'').replace(/\\\n\s*/g,' ').trim();
  navigator.clipboard.writeText(text).then(() => {
    btn.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i> copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = '<i class="ti ti-copy" aria-hidden="true"></i> copiar'; btn.classList.remove('copied'); }, 2000);
  });
}

renderProgress();
renderPanels();
</script>
